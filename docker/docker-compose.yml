version: "3.9"

name: sql-injection

services:
  postgres:
    image: postgres:latest
    container_name: postgres-sql-injection
    restart: always
    ports:
      - "5435:5432"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    environment:
      POSTGRES_PASSWORD: hh
      POSTGRES_DB: hh
      POSTGRES_USER: hh
